<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>opengd77-map</title>
  <style>
    :root {
      --bg: #0f1419;
      --text: #e7ecf3;
      --muted: #8b9cb3;
      --accent: #3d8bfd;
    }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    main { max-width: 36rem; }
    h1 { font-size: 1.5rem; margin: 0 0 0.5rem; }
    p { color: var(--muted); line-height: 1.5; }
    ul { padding-left: 1.25rem; line-height: 1.8; }
    a { color: var(--accent); }
  </style>
</head>
<body>
  <main>
    <h1>opengd77-map</h1>
    <p>Browser tools for visualising OpenGD77 codeplug geography. CSV files stay on your machine.</p>
    <ul>
      <li><a href="tools/channel-map/">Channel map</a> — plot <code>Channels.csv</code> and zone hulls from <code>Zones.csv</code></li>
    </ul>
  </main>
</body>
</html>
