# Progressive Abbreviation Dictionary — Amateur Radio Codeplug Shortener
# =======================================================================
# Format: "Full Term": [level1, level2, level3]
# Levels are progressively more aggressive. Apply the lowest level first;
# escalate only if the name still exceeds the target length.
#
# Matching should be case-insensitive. Replacements preserve original casing
# convention (e.g. title case in, title case out).
#
# Special category "stopwords" contains tokens that can be dropped entirely
# as a last resort. Handle separators (spaces, hyphens, slashes) separately.

