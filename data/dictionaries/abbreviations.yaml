# ─────────────────────────────────────────────────────────────────────────────
# STOPWORDS — tokens that may be dropped entirely as a final resort
# These have no abbreviation; the shortening strategy removes them wholesale.
# ─────────────────────────────────────────────────────────────────────────────

stopwords:
  - 'the'
  - 'of'
  - 'and'
  - '&'
  - 'a'
  - 'at'
  - 'in'
  - 'on'
  - 'for'
  - 'to'
  - 'via'
  - '-' # collapsing separators is its own step; listed here for reference


# ─────────────────────────────────────────────────────────────────────────────
# SEPARATOR HANDLING — not abbreviations, but part of the algorithm
# When names are shortened aggressively, collapsing separators recovers chars.
# Suggested cascade:
#   " - "  →  " "  →  ""    (space-dash-space → space → nothing)
#   " / "  →  "/"  →  ""
#   " "    →  ""            (final: remove all spaces)
# ─────────────────────────────────────────────────────────────────────────────
